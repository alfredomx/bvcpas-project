<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>kiro</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        margin: 0;
        padding: 1rem;
        min-width: 280px;
      }
      h1 {
        font-size: 1rem;
        margin: 0 0 0.75rem 0;
      }
      label {
        display: block;
        font-size: 0.75rem;
        color: #555;
        margin: 0.5rem 0 0.15rem 0;
      }
      input {
        width: 100%;
        box-sizing: border-box;
        font-size: 0.8rem;
        padding: 0.35rem;
      }
      button {
        margin-top: 0.75rem;
        font-size: 0.8rem;
        padding: 0.4rem 0.8rem;
        cursor: pointer;
      }
      #greeting {
        font-size: 0.9rem;
        margin: 0.25rem 0 0 0;
      }
      #status {
        margin-top: 0.6rem;
        font-size: 0.75rem;
      }
      .ok {
        color: #137333;
      }
      .off {
        color: #a50e0e;
      }
    </style>
  </head>
  <body>
    <h1>kiro — bridge</h1>

    <div id="login-view">
      <label for="url">BRIDGE URL</label>
      <input id="url" type="text" placeholder="ws://localhost:4000/bridge" />
      <label for="email">Email</label>
      <input id="email" type="email" placeholder="you@bv-cpas.com" />
      <label for="password">Password</label>
      <input id="password" type="password" placeholder="mapi password" />
      <button id="login">Login</button>
    </div>

    <div id="app-view" hidden>
      <p id="greeting"></p>
      <button id="reconnect">Reconnect</button>
      <button id="logout">Logout</button>
    </div>

    <div id="status"></div>
    <script type="module" src="./src/popup/popup.ts"></script>
  </body>
</html>
